<!doctype html>
<html lang="en">
  <head>
    <title>yee</title>
    <meta charset="utf-8">
    <meta name="description" content="&lt;model-viewer&gt; template">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link type="text/css" href="./styles.css" rel="stylesheet"/>
  </head>
  <body>
    <model-viewer src="bacon_head.glb" ar ar-modes="scene-viewer webxr quick-look" camera-controls tone-mapping="neutral" poster="poster.webp" shadow-intensity="1" auto-rotate scale="0.6 0.6 0.6" >
      
      <button class="Hotspot" slot="hotspot-1" data-position="-0.000596146967318148m 0.14550044889591046m 0.02925501886729065m" data-normal="-0.04184980761053447m 0.005654419820780709m 0.9991079126598146m" data-visibility-attribute="visible">
          <div class="HotspotAnnotation">1</div>
      </button>

      <div class="progress-bar hide" slot="progress-bar">
          <div class="update-bar"></div>
      </div>

      <button slot="ar-button" id="ar-button">
          View in your space
      </button>

      <div id="ar-prompt">
          <img src="ar_hand_prompt.png">
      </div>
    </model-viewer>  

    <script src="script.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
  </body>
</html>
